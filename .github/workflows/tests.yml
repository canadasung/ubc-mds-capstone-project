name: Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  test-apis:
    name: API Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mds-project
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install package in editable mode
        shell: bash -el {0}
        run: pip install -e .

      - name: Run API tests
        shell: bash -el {0}
        env:
          ENTREZ_EMAIL: ${{ secrets.ENTREZ_EMAIL }}
        run: |
          pytest -v \
            tests/APIs/ \
            --ignore=tests/APIs/API_Contract_Tests.py

  test-app:
    name: App Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mds-project
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install package in editable mode
        shell: bash -el {0}
        run: pip install -e .

      - name: Run app tests
        shell: bash -el {0}
        env:
          ENTREZ_EMAIL: ${{ secrets.ENTREZ_EMAIL }}
        run: pytest -v tests/app/test_prototype.py
