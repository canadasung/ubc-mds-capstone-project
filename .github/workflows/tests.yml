name: Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mds-project
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install package in editable mode
        shell: bash -el {0}
        run: pip install -e .

      # Runs the full offline unit suite (apis_pipe fixture replay, utils mocks,
      # and the mocked base-fetch cases). The `-m "not integration"` selector
      # excludes every test that makes a real HTTP call, so no credentials are
      # needed and a portal being down can never fail a PR. Live connectivity
      # checks (tests/integration) are intentionally not run in CI; run them
      # locally with `pytest -m integration` when needed.
      - name: Run unit tests
        shell: bash -el {0}
        run: pytest -v -m "not integration" tests/
