name: Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mds-project
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install package in editable mode
        shell: bash -el {0}
        run: pip install -e .

      - name: Run tests
        shell: bash -el {0}
        env:
          ENTREZ_EMAIL: ${{ secrets.ENTREZ_EMAIL }}
        run: |
          pytest -v \
            tests/APIs/ \
            tests/app/test_prototype.py \
            --ignore=tests/APIs/test_API.py \
            --junitxml=$GITHUB_WORKSPACE/test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ${{ github.workspace }}/test-results.xml
