name: mds-project
channels:
  - conda-forge
dependencies:
  - python==3.12
  - pandas==2.3.3
  - ipykernel==7.2.0
  - jupyter==1.0.0
  - requests
  - python-dotenv
  - streamlit
  - pytest
  - pip
  - pip:
    - -e . # install scripts as an editable package so that the scripts files are importable from anywhere — notebooks, the app, and tests — without any path configuration.